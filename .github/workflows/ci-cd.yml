name: CI/CD — Lint & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bidagent
          POSTGRES_PASSWORD: bidagent
          POSTGRES_DB: bidagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bidagent -d bidagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (ruff)
        id: ruff_lint
        shell: bash
        run: |
          cd backend
          ruff --version
          ruff check . 2>&1 | tee /tmp/ruff_output.txt
          exit ${PIPESTATUS[0]}

      - name: Test backend (pytest)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          createdb -h localhost -U bidagent bidagent_test
          cd backend
          python -m compileall -q app
          python -m pytest -q
        env:
          APP_ENV: test
          DEBUG: "false"
          DATABASE_URL: postgresql+asyncpg://bidagent:bidagent@localhost:5432/bidagent
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_URL: redis://localhost:6379/2
          SECRET_KEY: ci-secret
          JWT_SECRET_KEY: ci-jwt-secret
          EMAIL_ENABLED: "false"
          PGPASSWORD: bidagent

      - name: Upload ruff output on failure
        if: failure() && steps.ruff_lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: /tmp/ruff_output.txt
          retention-days: 1

      # ── Frontend ─────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Audit frontend production dependencies
        run: |
          cd frontend
          npm audit --omit=dev --audit-level=moderate

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bid.easudata.com

  # ── Job 2: Deploy (SSH → git pull → build on server) ─
  deploy:
    name: Deploy to Production
    needs: lint-test
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: SSH → git pull → build & restart on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 85m
          script: |
            cd /opt/bid_agent || { echo "FATAL: cannot cd /opt/bid_agent"; exit 1; }

            echo "=== Step 1/4: Git sync ==="
            git fetch origin main && git reset --hard origin/main && git clean -fd
            if [ $? -ne 0 ]; then echo "FAILED at: git sync"; exit 1; fi
            echo "    HEAD: $(git log --oneline -1)"

            echo "=== Step 2/4: Start remote deploy script (async) ==="
            chmod +x deploy/remote-deploy.sh
            : > /tmp/bid_agent_deploy.log
            echo "running" > /tmp/bid_agent_deploy.status
            nohup bash deploy/remote-deploy.sh >> /tmp/bid_agent_deploy.log 2>&1 &
            DEPLOY_PID=$!
            echo "$DEPLOY_PID" > /tmp/bid_agent_deploy.pid
            echo "    Started PID: $DEPLOY_PID"

            echo "=== Step 3/4: Poll deploy status (max 70m) ==="
            for i in $(seq 1 210); do
              STATUS=$(cat /tmp/bid_agent_deploy.status 2>/dev/null || echo "running")
              if [ "$STATUS" = "success" ]; then
                echo "    Deploy succeeded"
                break
              fi
              if [ "$STATUS" = "failed" ]; then
                echo "FAILED: remote deploy script reported failure"
                tail -n 120 /tmp/bid_agent_deploy.log || true
                exit 1
              fi
              if [ $((i % 6)) -eq 0 ]; then
                echo "    still running... (${i}/210)"
              fi
              sleep 20
            done

            STATUS=$(cat /tmp/bid_agent_deploy.status 2>/dev/null || echo "unknown")
            if [ "$STATUS" != "success" ]; then
              echo "FAILED: deploy did not finish in 70 minutes (status=$STATUS)"
              tail -n 120 /tmp/bid_agent_deploy.log || true
              exit 1
            fi

            echo "=== Step 4/4: Show deploy tail log ==="
            tail -n 80 /tmp/bid_agent_deploy.log || true
            echo "=== Deploy complete: $(date) ==="
