name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-backend
  FRONTEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-frontend

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (ruff)
        run: |
          cd backend
          ruff check .

      # ── Frontend ─────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bid.easudata.com

  # ── Job 2: Build & Push Docker Images ───────────────
  build-push:
    name: Build & Push Images
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://bid.easudata.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Tencent Cloud ──────────────────
  deploy:
    name: Deploy to Production
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.prod.yml,.env.production.example,deploy/"
          target: /opt/bid_agent
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/bid_agent

            # Ensure data directory exists
            mkdir -p data/uploads

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo ">>> Creating .env from template..."
              cp .env.production.example .env
              # Generate random secrets
              SECRET_KEY=$(openssl rand -hex 32)
              JWT_SECRET=$(openssl rand -hex 32)
              DB_PASS=$(openssl rand -hex 16)
              sed -i "0,/REPLACE_WITH_openssl_rand_hex_32/s//$SECRET_KEY/" .env
              sed -i "0,/REPLACE_WITH_openssl_rand_hex_32/s//$JWT_SECRET/" .env
              sed -i "s/REPLACE_STRONG_DB_PASSWORD/$DB_PASS/g" .env
              echo "⚠️  .env created with random secrets. Edit /opt/bid_agent/.env to add API keys!"
            fi

            # Keep nginx sites and TLS in sync with the repo
            bash deploy/install-nginx-sites.sh

            # Pull latest images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # Start / restart services
            docker compose -f docker-compose.prod.yml up -d

            # Wait for DB, then migrate
            echo ">>> Waiting for database..."
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head || echo "⚠️  Migration may need .env config"

            # Clean up
            docker image prune -f

            echo "✅ Deploy complete: $(date)"
