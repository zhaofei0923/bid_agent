name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-backend
  FRONTEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-frontend

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (ruff)
        id: ruff_lint
        shell: bash
        run: |
          cd backend
          ruff --version
          ruff check . 2>&1 | tee /tmp/ruff_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload ruff output on failure
        if: failure() && steps.ruff_lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: /tmp/ruff_output.txt
          retention-days: 1

      # ── Frontend ─────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bid.easudata.com

  # ── Job 2: Build & Push Docker Images ───────────────
  build-push:
    name: Build & Push Images
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://bid.easudata.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Tencent Cloud ──────────────────
  deploy:
    name: Deploy to Production
    needs: [lint-test, build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Trigger remote deploy and poll status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 85m
          script: |
            cd /opt/bid_agent || { echo "FATAL: cannot cd /opt/bid_agent"; exit 1; }

            echo "=== Step 1/4: Git sync ==="
            git fetch origin main && git reset --hard origin/main && git clean -fd
            if [ $? -ne 0 ]; then echo "FAILED at: git sync"; exit 1; fi
            echo "    HEAD: $(git log --oneline -1)"

            echo "=== Step 2/4: Start remote deploy script (async) ==="
            chmod +x deploy/remote-deploy.sh
            : > /tmp/bid_agent_deploy.log
            echo "running" > /tmp/bid_agent_deploy.status
            nohup bash deploy/remote-deploy.sh >> /tmp/bid_agent_deploy.log 2>&1 &
            DEPLOY_PID=$!
            echo "$DEPLOY_PID" > /tmp/bid_agent_deploy.pid
            echo "    Started PID: $DEPLOY_PID"

            echo "=== Step 3/4: Poll deploy status (max 70m) ==="
            for i in $(seq 1 210); do
              STATUS=$(cat /tmp/bid_agent_deploy.status 2>/dev/null || echo "running")
              if [ "$STATUS" = "success" ]; then
                echo "    Deploy succeeded"
                break
              fi
              if [ "$STATUS" = "failed" ]; then
                echo "FAILED: remote deploy script reported failure"
                tail -n 120 /tmp/bid_agent_deploy.log || true
                exit 1
              fi
              if [ $((i % 6)) -eq 0 ]; then
                echo "    still running... (${i}/210)"
              fi
              sleep 20
            done

            STATUS=$(cat /tmp/bid_agent_deploy.status 2>/dev/null || echo "unknown")
            if [ "$STATUS" != "success" ]; then
              echo "FAILED: deploy did not finish in 70 minutes (status=$STATUS)"
              tail -n 120 /tmp/bid_agent_deploy.log || true
              exit 1
            fi

            echo "=== Step 4/4: Show deploy tail log ==="
            tail -n 80 /tmp/bid_agent_deploy.log || true
            echo "=== Deploy complete: $(date) ==="
