name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-backend
  FRONTEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-frontend

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (ruff)
        run: |
          cd backend
          ruff check .

      # ── Frontend ─────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bid.easudata.com

  # ── Job 2: Build & Push Docker Images ───────────────
  build-push:
    name: Build & Push Images
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://bid.easudata.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Tencent Cloud ──────────────────
  deploy:
    name: Deploy to Production
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH (git pull + build on server)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 15m
          script: |
            set -e

            # On any failure, dump diagnostics
            cleanup() {
              echo ""; echo ">>> DEPLOY DIAGNOSTICS <<<"
              cd /opt/bid_agent
              echo "--- Container status ---"
              docker compose -f docker-compose.prod.yml ps -a 2>/dev/null || true
              echo "--- Backend logs (last 30 lines) ---"
              docker compose -f docker-compose.prod.yml logs --tail=30 backend 2>/dev/null || true
              echo "--- Celery worker logs (last 10 lines) ---"
              docker compose -f docker-compose.prod.yml logs --tail=10 celery-worker 2>/dev/null || true
            }
            trap cleanup EXIT

            cd /opt/bid_agent

            # Pull latest code from GitHub (force reset to match remote)
            echo ">>> [1/7] Syncing code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "    Code synced: $(git log --oneline -1)"

            # Ensure data directory exists
            mkdir -p data/uploads

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo ">>> Creating .env from template..."
              cp .env.production.example .env
              SECRET_KEY=$(openssl rand -hex 32)
              JWT_SECRET=$(openssl rand -hex 32)
              DB_PASS=$(openssl rand -hex 16)
              sed -i "0,/REPLACE_WITH_openssl_rand_hex_32/s//$SECRET_KEY/" .env
              sed -i "0,/REPLACE_WITH_openssl_rand_hex_32/s//$JWT_SECRET/" .env
              sed -i "s/REPLACE_STRONG_DB_PASSWORD/$DB_PASS/g" .env
              echo "⚠️  .env created. Edit /opt/bid_agent/.env to add API keys!"
            fi

            # Keep nginx in sync
            echo ">>> [2/7] Configuring nginx..."
            bash deploy/install-nginx-sites.sh
            echo "    Nginx configured."

            # Build images locally on server (uses Docker layer cache)
            # Use npmmirror CDN for Playwright Chromium (Google Storage blocked in China)
            echo ">>> [3/7] Building Docker images on server..."
            export PLAYWRIGHT_CHROMIUM_DOWNLOAD_HOST="https://registry.npmmirror.com/-/binary/chrome-for-testing"
            docker compose -f docker-compose.prod.yml build
            echo "    Images built."

            # Start / restart services
            echo ">>> [4/7] Starting services..."
            docker compose -f docker-compose.prod.yml up -d
            echo "    Services started."

            # Wait for backend container to be ready
            echo ">>> [5/7] Waiting for backend container..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T backend echo "ready" 2>/dev/null; then
                echo "    Backend is running."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "    ERROR: Backend not ready after 60s"
                exit 1
              fi
              echo "    Waiting... ($i/30)"
              sleep 2
            done

            # Run database migrations
            echo ">>> [6/7] Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            echo "    Migrations applied."

            # Clean up old images
            echo ">>> [7/7] Cleaning up..."
            docker image prune -f

            echo "✅ Deploy complete: $(date)"
