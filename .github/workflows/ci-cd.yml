name: CI/CD — Lint, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-backend
  FRONTEND_IMAGE: ghcr.io/zhaofei0923/bid_agent-frontend

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (ruff)
        run: |
          cd backend
          ruff check .

      # ── Frontend ─────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bid.easudata.com

  # ── Job 2: Build & Push Docker Images ───────────────
  build-push:
    name: Build & Push Images
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://bid.easudata.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Tencent Cloud ──────────────────
  deploy:
    name: Deploy to Production
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH (git pull + build on server)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 15m
          script: |
            # Manual error handling — no set -e so we can report which step fails
            cd /opt/bid_agent || { echo "FATAL: cannot cd /opt/bid_agent"; exit 1; }

            echo "=== Step 1/6: Git sync ==="
            git fetch origin main && git reset --hard origin/main && git clean -fd
            if [ $? -ne 0 ]; then echo "FAILED at: git sync"; exit 1; fi
            echo "    HEAD: $(git log --oneline -1)"

            echo "=== Step 2/6: Ensure .env & data dir ==="
            mkdir -p data/uploads
            if [ ! -f .env ]; then
              cp .env.production.example .env
              SECRET_KEY=$(openssl rand -hex 32)
              JWT_SECRET=$(openssl rand -hex 32)
              DB_PASS=$(openssl rand -hex 16)
              sed -i "0,/REPLACE_WITH_openssl_rand_hex_32/s//$SECRET_KEY/" .env
              sed -i "0,/REPLACE_WITH_openssl_rand_hex_32/s//$JWT_SECRET/" .env
              sed -i "s/REPLACE_STRONG_DB_PASSWORD/$DB_PASS/g" .env
              echo "    .env created from template"
            else
              echo "    .env exists"
            fi

            echo "=== Step 3/6: Nginx ==="
            bash deploy/install-nginx-sites.sh
            if [ $? -ne 0 ]; then echo "FAILED at: nginx config"; exit 1; fi
            echo "    OK"

            echo "=== Step 4/6: Docker build ==="
            export PLAYWRIGHT_CHROMIUM_DOWNLOAD_HOST="https://registry.npmmirror.com/-/binary/chrome-for-testing"
            docker compose -f docker-compose.prod.yml build 2>&1
            if [ $? -ne 0 ]; then echo "FAILED at: docker compose build"; exit 1; fi
            echo "    OK"

            echo "=== Step 5/6: Docker up ==="
            # 先停掉并移除孤立容器，避免容器名称冲突
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans 2>&1
            if [ $? -ne 0 ]; then echo "FAILED at: docker compose up"; exit 1; fi
            echo "    Container status:"
            docker compose -f docker-compose.prod.yml ps -a

            echo "=== Step 6/6: Database migration ==="
            echo "    Waiting 15s for containers..."
            sleep 15
            echo "    Running alembic..."
            docker compose -f docker-compose.prod.yml exec -T backend python -m alembic upgrade head 2>&1
            ALEMBIC_RC=$?
            if [ $ALEMBIC_RC -ne 0 ]; then
              echo "FAILED at: alembic upgrade head (rc=$ALEMBIC_RC)"
              echo "    Backend logs:"
              docker compose -f docker-compose.prod.yml logs --tail=50 backend 2>&1 || true
              exit $ALEMBIC_RC
            fi
            echo "    Migration OK"

            docker image prune -f > /dev/null 2>&1
            echo "=== Deploy complete: $(date) ==="
