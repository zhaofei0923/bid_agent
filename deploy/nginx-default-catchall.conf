# Default catch-all site.
# This prevents unmatched requests from falling through to whichever project
# happens to be loaded first in nginx. Install this only after the
# bid.easudata.com certificate exists.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/bid.easudata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bid.easudata.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    return 444;
}
